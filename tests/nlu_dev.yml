version: "3.1"

# Диагностический набор использовался для анализа ошибок между итерациями.
# Финальная отложенная оценка находится в tests/nlu_test.yml.
nlu:
- intent: greet
  examples: |
    - здравия и успехов
    - моё почтение
    - приветствую вас в новом диалоге
    - начнём со знакомства
    - здравия желаю
    - хочу начать с приветствия
    - приятно встретиться
    - начинаю разговор с приветствия
    - алло, помощник, ты здесь
    - на связи новый пользователь

- intent: goodbye
  examples: |
    - благодарю за беседу, я завершаю работу
    - пора заканчивать нашу встречу
    - оставим вопросы до другого раза
    - желаю удачи, до нового разговора
    - я больше не буду тебя задерживать
    - можно закрыть беседу
    - увидимся в следующем сеансе
    - откланиваюсь
    - на сегодня закончили
    - покидаю чат

- intent: thanks
  examples: |
    - твоя подсказка пригодилась
    - я получил нужное объяснение, благодарю
    - ты здорово меня выручил
    - теперь всё ясно, моя благодарность
    - признателен за содержательный разбор
    - помощь пришлась очень кстати
    - благодарю, вопрос решён
    - ценная подсказка, спасибо тебе
    - ответ оказался полезным, большое спасибо
    - выражаю признательность за содействие

- intent: help
  examples: |
    - сориентируй меня по доступным разделам
    - не знаю, с чего начать общение
    - предложи темы для разговора
    - проведи краткий обзор своих навыков
    - какие операции доступны пользователю
    - где посмотреть руководство по боту
    - объясни правила взаимодействия с системой
    - что входит в твою компетенцию
    - покажи меню функций
    - какие задачи тебе можно поручить

- intent: ask_name
  examples: |
    - как подписан мой виртуальный собеседник
    - сообщи своё обозначение
    - представь себя пользователю
    - каково имя системы
    - хотелось бы знать, с кем ведётся беседа
    - какое обращение ты предпочитаешь
    - кем мне считать отвечающего помощника
    - подскажи название бота
    - идентифицируй себя
    - кто находится на другом конце диалога

- intent: ask_creator
  examples: |
    - назови человека, выполнившего разработку
    - чья работа лежит в основе ассистента
    - укажи создателя программного решения
    - кем написана эта система
    - кто подготовил исходный код
    - хочу узнать исполнителя дипломной работы
    - сообщи фамилию автора бота
    - кто стоял за созданием помощника
    - какой разработчик реализовал проект
    - назови человека, которому принадлежит эта разработка

- intent: ask_project
  examples: |
    - сформулируй основную идею выполненной работы
    - какой замысел лежит в основе ассистента
    - опиши предмет дипломного исследования
    - какую пользу должна показать разработка
    - что было главной целью автора проекта
    - дай общее резюме выполненной системы
    - какие результаты представляет этот диплом
    - в рамках какой темы создан помощник
    - раскрой суть проектной работы
    - какую концепцию диалоговых систем здесь исследуют

- intent: inform_name
  examples: |
    - для начала запомни, что собеседника зовут [Максим](person_name)
    - в карточке пользователя укажи [Ольга](person_name)
    - подпиши меня как [Сергей Белов](person_name)
    - я зарегистрирована под именем [Юлия Андреева](person_name)
    - правильное написание моего имени — [Нур-Мухаммад](person_name)
    - задай мне обращение [Анастасия](person_name)
    - имя для этого сеанса: [Вадим](person_name)
    - пожалуйста, считай моим именем [Гульнара Каримова](person_name)
    - правильное обращение ко мне — [Пётр Алексеевич](person_name)
    - мой собеседник может называть меня [Эмиль](person_name)
    - внеси в память имя [Ксения](person_name)
    - я отзываюсь на имя [Андрей Соколов](person_name)
    - пусть в разговоре моим именем будет [Лейла](person_name)
    - для обращения подойдёт [Степан](person_name)
    - зафиксируй для беседы имя [Майя-Лин](person_name)

- intent: ask_restart
  examples: |
    - создай беседу без предыдущих сообщений
    - требуется полностью обновить состояние чата
    - можешь забыть всё сказанное ранее
    - открой для меня чистый сеанс
    - хочу сбросить сохранённый ход общения
    - верни бота в состояние первого запуска
    - удали накопленный контекст этой переписки
    - переключи нас на новую беседу
    - перезапуск нужен без сохранения истории
    - очистим сведения из текущего разговора

- intent: ask_rasa
  examples: |
    - к какому типу программ относится Rasa
    - расскажи, что представляет собой этот фреймворк
    - почему для диалогового помощника взяли платформу Rasa
    - какое место занимает Rasa в общей системе
    - перечисли ключевые части фреймворка
    - для каких проектов подходит Rasa Open Source
    - в чём преимущество Rasa для учебного ассистента
    - охарактеризуй платформу, на которой построен бот
    - какие возможности предоставляет сама Rasa
    - объясни назначение фреймворка без деталей обучения

- intent: ask_nlu
  examples: |
    - каким способом фраза получает метку намерения
    - объясни разницу между целью запроса и извлечённым значением
    - что делает модуль понимания пользовательской речи
    - каким образом предложение относят к нужному классу
    - зачем отмечать имена внутри обучающих фраз
    - какой этап отвечает за смысловой разбор текста
    - что возвращает анализатор языка диалоговому менеджеру
    - как распознаются полезные значения в сообщении
    - раскрой понятия intent и entity на примере
    - по какому принципу бот понимает категорию реплики

- intent: ask_training
  examples: |
    - опиши, как из размеченного корпуса получается классификатор
    - что алгоритм делает с примерами во время тренировки
    - когда требуется заново построить модель
    - каким должен быть набор данных для качественного обучения
    - где настраиваются параметры тренировочного процесса
    - как обучающие фразы используются компонентом DIET
    - что создаётся после завершения процедуры обучения
    - почему нельзя оценивать модель на её тренировочных данных
    - какие шаги проходит подготовка модели к работе
    - как изменится обучение после добавления нового класса

- intent: ask_run
  examples: |
    - как перейти от готового архива модели к разговору
    - подскажи команду для интерактивной проверки бота
    - что включить, чтобы принимать сообщения в консоли
    - каким образом поднять уже подготовленный ассистент
    - как открыть режим непосредственного общения
    - опиши запуск компонентов после обучения
    - где проверить ответы работающей модели
    - как отдельно стартовать исполнитель custom actions
    - что необходимо запустить для локальной демонстрации
    - как проверить систему вручную через shell

- intent: ask_project_structure
  examples: |
    - нарисуй карту директорий репозитория
    - в какой части проекта объявлена сущность имени
    - откуда Rasa читает примеры пользовательских фраз
    - найди файл с шаблонами ответов
    - где располагается реализация действий на Python
    - какой конфигурационный файл описывает компоненты NLU
    - поясни распределение кода и данных по каталогам
    - в каком документе указан адрес сервера actions
    - где искать правила переходов между репликами
    - какие основные элементы находятся в корне проекта

- intent: ask_docker
  examples: |
    - почему окружение проекта упаковано в образы
    - какую задачу выполняет Compose при сборке сервисов
    - поясни разделение приложения на два контейнера
    - как контейнеризация обеспечивает одинаковый запуск
    - для чего сервисам внутренняя сеть Docker
    - что означает зафиксированный тег образа
    - где описаны зависимости контейнерного окружения
    - почему actions не находятся в одном процессе с Rasa
    - какую роль играют проброшенные порты
    - расскажи, как Compose объединяет части системы

- intent: feedback_bad
  examples: |
    - предыдущая реакция не соответствует смыслу фразы
    - я ожидал совсем другое объяснение
    - исправь результат, он получился неточным
    - классификация моего запроса явно ошибочна
    - приведённые сведения не отвечают на вопрос
    - такой ответ только запутывает
    - помощник выбрал неподходящий вариант реакции
    - качество объяснения меня разочаровало
    - повтори по-другому, сейчас ничего не ясно
    - ты неверно определил, чего я хотел

- intent: ask_time
  examples: |
    - можно свериться с ташкентскими часами
    - выведи показание времени для UTC+5
    - сколько минут после текущего часа
    - мне нужны часы на данный момент
    - сообщи временную отметку без календаря
    - что сейчас показывают часы в городе
    - нужна временная отметка по местному поясу
    - подскажи актуальные показания часов
    - узнай время для ташкентского пояса
    - какой час наступил прямо сейчас

- intent: ask_date
  examples: |
    - какой лист календаря соответствует этому дню
    - перечисли нынешние число, месяц и год
    - сообщи календарные данные на данный момент
    - что за число сегодня по местному календарю
    - напомни месяц и день сегодняшнего дня
    - выведи дату для часового пояса Ташкента
    - какое число следует записать в документе сегодня
    - назови сегодняшние календарные реквизиты
    - какой датой отмечен текущий день
    - мне требуется число этого месяца и год

- intent: smalltalk_howareyou
  examples: |
    - как проходит твоя виртуальная жизнь
    - готов ли помощник сегодня работать
    - расскажи о своём самочувствии
    - как складывается твой рабочий день
    - давно не виделись, как ты там
    - надеюсь, система чувствует себя прекрасно
    - какое настроение у моего собеседника
    - всё ли спокойно в твоём цифровом мире
    - как ты поживал без меня
    - бот сегодня в хорошем расположении духа

- intent: smalltalk_joke
  examples: |
    - удиви меня остроумной репликой
    - есть ли у тебя забавный анекдот для беседы
    - устрой небольшую минуту смеха
    - хочу проверить твоё чувство юмора
    - поделись весёлой историей про код
    - произнеси что-либо, способное рассмешить
    - разряди обстановку забавным ответом
    - подкинь хорошую шутейку
    - пора добавить в диалог немного веселья
    - умеешь смешно шутить

- intent: out_of_scope
  examples: |
    - какая температура будет завтра утром
    - подбери авиабилеты до Дубая
    - научи меня играть на гитаре
    - составь меню на неделю
    - найди результаты теннисного турнира
    - сколько белка содержится в курице
    - объясни правила получения визы
    - переведи деньги на другую карту
    - расскажи последние политические события
    - помоги выбрать университет для поступления
    - напиши программу сортировки на Java
    - какая планета ближе всего к Солнцу
    - отредактируй фотографию для паспорта
    - найди дешёвый мобильный тариф
    - составь маршрут путешествия по Италии
    - когда приедет автобус номер двадцать четыре
    - подскажи упражнения для больной спины
    - создай презентацию по истории
    - сколько будет сто сорок семь умножить на восемь
    - закажи букет цветов с доставкой
    - проверь наличие товара в магазине
    - подбери рецепт без глютена
    - расскажи биографию Альберта Эйнштейна
    - найди прогноз землетрясений
    - помоги настроить домашний роутер
    - сочини поздравление с юбилеем
    - определи породу собаки по описанию
    - узнай результаты анализов в клинике
    - рассчитай налог с заработной платы
    - включи кондиционер на двадцать градусов
