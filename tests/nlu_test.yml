version: "3.1"

# Отложенный набор не входит в train; его результаты не использовались для
# настройки финальной модели. Пересечения и пороговые метрики проверяются статически.
nlu:
  - intent: greet
    examples: |
      - Я заглянул поздороваться — приветствую!
      - Приятно встретиться с тобой этим утром
      - Здравствуйте, рад начать беседу
      - Приветствую тебя
      - Рад нашей вечерней встрече, помощник
      - Хей, давай поговорим
      - Ну здравствуй, цифровой собеседник
      - Всем доброго дня
      - Я здесь, начнём?
      - Здорово, помощник

  - intent: goodbye
    examples: |
      - Буду прощаться, счастливо оставаться
      - Пока, спасибо за беседу
      - На этом закончим
      - Мне пора, до встречи
      - На сегодня всё, хорошего дня
      - Увидимся в следующий раз
      - Завершаю разговор
      - Закрываю чат до нашей следующей беседы
      - Ладно, я ухожу
      - Можно прощаться

  - intent: thanks
    examples: |
      - Ты выручил, премного благодарен
      - Большое спасибо за ответ
      - Прими мою искреннюю благодарность
      - Я ценю оказанную поддержку
      - Ты здорово помог
      - После твоего ответа всё прояснилось, благодарю
      - Твоя помощь пришлась кстати, спасибо
      - Большое человеческое спасибо тебе
      - Признателен за такое понятное объяснение
      - Ты дал полезную подсказку, огромное спасибо

  - intent: help
    examples: |
      - Озвучь круг задач, с которыми к тебе можно прийти
      - Покажи список возможностей
      - Как тобой пользоваться?
      - С какими вопросами можно обращаться?
      - Подскажи доступные команды
      - Мне нужна помощь по работе с ботом
      - С чего начать диалог с тобой?
      - Расскажи, чем можешь помочь
      - Какие функции у тебя есть?
      - Дай краткую инструкцию по общению

  - intent: ask_name
    examples: |
      - Какое имя подставить вместо обращения «бот»?
      - У виртуального собеседника предусмотрено имя?
      - Представься, пожалуйста
      - Кто ты такой?
      - Какое обращение к тебе будет правильным?
      - Сообщи своё имя как бота
      - Ты какой бот?
      - Можно узнать твоё имя?
      - Каким именем ты представляешься пользователям?
      - Расскажи о своей идентичности

  - intent: ask_creator
    examples: |
      - Кому принадлежит разработка этого помощника?
      - Кто твой разработчик?
      - Назови автора этого бота
      - Чьей работой стало твоё появление?
      - Кто работал над твоим созданием?
      - Чей это программный проект?
      - Кто написал твою логику?
      - Что можешь сообщить об авторе своей разработки?
      - Как зовут разработчика системы?
      - Кто является автором помощника?

  - intent: ask_project
    examples: |
      - В чём цель дипломного проекта?
      - Для чего создан этот дипломный бот?
      - Каково назначение проекта?
      - Какую задачу решает эта дипломная работа?
      - Расскажи об идее проекта
      - Зачем понадобилась эта система?
      - Какой результат должен показать диплом?
      - Какую практическую идею диплома воплощает этот бот?
      - Какова практическая цель разработки?
      - О чём этот дипломный проект?

  - intent: inform_name
    examples: |
      - Разреши представиться: я [Анна](person_name)
      - Если понадобится обратиться лично, моё имя — [Мехринисо](person_name)
      - Для начала представлюсь — [Дилноза](person_name)
      - Моё имя для общения — [Алексей](person_name)
      - При знакомстве я представляюсь как [Малика](person_name)
      - Перед тобой [Евгений](person_name), будем знакомы
      - В этой беседе моё имя [Светлана](person_name)
      - Для знакомства, я [Бахтиёр](person_name)
      - [Анна-Мария](person_name) — так звучит моё имя
      - Будем знакомы, перед тобой [Али-Акбар](person_name)
      - По документам я [Саида Каримова](person_name)
      - Я представлюсь полностью: [Отабек Юсупов](person_name)
      - Пришло время познакомиться: я [Нодира Усманова](person_name)
      - На обращение [Темур-Бек](person_name) я откликнусь
      - Сохрани моё имя: [Александр Сергеев](person_name)

  - intent: ask_restart
    examples: |
      - Сбрось текущую беседу и открой новую
      - Очисти контекст разговора
      - Давай с чистого листа
      - Забудь предыдущие сообщения
      - Перезапусти нашу беседу
      - Хочу начать новую сессию
      - Сбрось историю текущего диалога
      - Верни разговор в начальное состояние
      - Обнули контекст, пожалуйста
      - Можно всё начать сначала?

  - intent: ask_rasa
    examples: |
      - Объясни, какую технологию называют Rasa
      - Для чего нужна платформа Rasa?
      - Какую роль Rasa играет в этом боте?
      - Объясни назначение Rasa
      - Rasa — это библиотека или сервис?
      - Зачем проекту используется Rasa?
      - Что делает фреймворк Rasa?
      - Расскажи, как Rasa участвует в обработке сообщений
      - На чём основана Rasa?
      - Какие задачи в системе выполняет Rasa?

  - intent: ask_nlu
    examples: |
      - Что такое NLU?
      - Как бот понимает смысл текста?
      - Объясни разницу между интентом и сущностью
      - Как определяется намерение пользователя?
      - Что называют entity в NLU?
      - Каким образом из сообщения извлекаются сущности?
      - За что отвечает модуль понимания языка?
      - Как фраза преобразуется в intent?
      - Расскажи про распознавание интентов
      - Что происходит на этапе анализа пользовательского текста?

  - intent: ask_training
    examples: |
      - Как обучить модель с нуля?
      - Какие данные нужны для обучения бота?
      - Опиши процесс тренировки NLU
      - Что происходит до получения готовой модели?
      - Как запустить обучение проекта?
      - Из каких этапов состоит подготовка модели?
      - Где берутся примеры для тренировки?
      - Нужно ли переобучать модель после изменения данных?
      - Как формируется обученная модель Rasa?
      - Расскажи о подготовке датасета и обучении

  - intent: ask_run
    examples: |
      - Как запустить уже обученную модель?
      - Чем проверить готового бота?
      - Какая команда запускает Rasa после обучения?
      - Как протестировать сохранённую модель?
      - Что нужно сделать, чтобы поговорить с обученным ботом?
      - Как поднять проект для локальной проверки?
      - Где проверить ответы готовой модели?
      - Как запустить чат с существующей моделью?
      - Можно ли проверить модель без повторного обучения?
      - Опиши запуск бота в режиме проверки

  - intent: ask_project_structure
    examples: |
      - Как устроена структура проекта?
      - За что отвечают файлы в репозитории?
      - Какие каталоги есть у Rasa-проекта?
      - Где находятся настройки и данные?
      - Расшифруй роль ключевых файлов проекта
      - В какой папке лежат модели?
      - Что обычно хранится в каталоге actions?
      - Покажи схему файлов проекта
      - Где искать конфигурацию Rasa?
      - Расскажи, как организованы директории

  - intent: ask_docker
    examples: |
      - Как запустить проект в Docker?
      - Для чего нужен Docker Compose?
      - Какие контейнеры используются системой?
      - Как сервисы общаются внутри docker-сети?
      - Какие порты нужно открыть для контейнеров?
      - Где описана конфигурация Compose?
      - Как собрать Docker-образ бота?
      - Почему контейнер Rasa не видит action server?
      - Как проверить запущенные сервисы Docker?
      - Объясни контейнерную схему проекта

  - intent: feedback_bad
    examples: |
      - Это неправильный ответ
      - Ты мне не помог
      - Ответ не соответствует вопросу
      - Нет, это совсем не то
      - В сообщённых сведениях есть ошибка
      - Ты неправильно меня понял
      - Такой ответ бесполезен
      - Разобраться не получилось: твой ответ увёл в сторону
      - Исправься, ответ ошибочный
      - Это не решает мою проблему

  - intent: ask_time
    examples: |
      - Что показывают часы в эту минуту?
      - Сообщи актуальные часы и минуты
      - Хочу сверить часы — назови время
      - Какое время на часах?
      - Можешь назвать точное время?
      - Уже поздно или ещё рано?
      - Скажи, который час прямо сейчас
      - Хочу узнать местное время
      - Определи, сейчас утро, день, вечер или ночь
      - Покажи время на данный момент

  - intent: ask_date
    examples: |
      - Какой календарный день наступил сегодня?
      - Заполни сегодняшнюю строку календаря: число, месяц и год
      - Какой сегодня день?
      - Подскажи дату на сегодня
      - Какой сейчас год, месяц и день?
      - Покажи сегодняшнюю дату
      - Что у нас сегодня по календарю?
      - Можешь сказать, какое нынче число?
      - Какая дата стоит сейчас?
      - Уточни сегодняшние месяц и число

  - intent: smalltalk_howareyou
    examples: |
      - Как у тебя дела?
      - Как настроение?
      - Ты сегодня в порядке?
      - Как жизнь у цифрового помощника?
      - С тобой нынче всё ладно?
      - Удачно ли проходит твой день?
      - Есть ли перемены в твоих делах?
      - Ты как?
      - Каково твоё виртуальное самочувствие?
      - В каком ты сегодня расположении духа?

  - intent: smalltalk_joke
    examples: |
      - Расскажи анекдот
      - Пошути, пожалуйста
      - Знаешь смешную историю?
      - Хочу улыбнуться — придумай что-нибудь забавное
      - Можешь рассказать шутку?
      - Хочу услышать что-нибудь забавное
      - Разряди обстановку хорошей шуткой
      - Есть свежий анекдот?
      - Брось остроумную реплику
      - Давай короткую шутку

  - intent: out_of_scope
    examples: |
      - Какая погода завтра в Самарканде?
      - Переведи слово «дружба» на японский
      - Сколько будет 347 умножить на 29?
      - Подбери рецепт плова без мяса
      - Кто выиграл вчерашний футбольный матч?
      - Закажи мне такси до аэропорта
      - Найди дешёвые билеты в Алматы
      - Включи музыку для концентрации
      - Поставь будильник на шесть утра
      - Напомни позвонить врачу вечером
      - Какой сейчас курс доллара к суму?
      - Расскажи последние мировые новости
      - Посоветуй сериал на выходные
      - Напиши поздравление с годовщиной свадьбы
      - Как вылечить сильную боль в спине?
      - Можешь составить договор аренды квартиры?
      - Где ближайшая круглосуточная аптека?
      - Проверь статус посылки по номеру отслеживания
      - Проложи маршрут до железнодорожного вокзала
      - Подбери смартфон дешевле трёх миллионов сумов
      - Объясни квантовую запутанность простыми словами
      - Кто написал роман «Преступление и наказание»?
      - Как завести автомобиль после морозной ночи?
      - Перезапусти мой ноутбук
      - Подскажи схему вязания тёплого шарфа спицами
      - Как устроена файловая система Windows?
      - Что означает слово «раса» в биологии?
      - Как меня зовут?
      - Сколько времени варить рис?
      - Какова дата рождения Александра Пушкина?
